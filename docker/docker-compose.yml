services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ..:/app
      - /app/node_modules
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/moviedb"
      JWT_SECRET: "${JWT_SECRET:-changeme}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:-30m}"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      TMDB_BASE_URL: "${TMDB_BASE_URL:-https://api.themoviedb.org/3}"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - moviedb

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moviedb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - moviedb

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - moviedb

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - moviedb

networks:
  moviedb:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
