[build]
dockerfilePath = "docker/Dockerfile"
dockerContext = "."
dockerTarget = "production"
buildArgs = { CACHE_BUST = "3" }

[deploy]
startCommand = "until npx prisma migrate deploy; do echo 'Migration failed, retrying in 5s...'; sleep 5; done && node dist/main"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
